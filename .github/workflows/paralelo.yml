name: ejecucion en paralelo
on: push
jobs: 
  lint: 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint code
        run: npm run lint
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18,20,22]
  deploy: 
    needs: [lint,test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest